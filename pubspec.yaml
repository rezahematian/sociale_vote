name: sociale_vote
description: Civic social voting platform
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  fl_chart: ^0.66.0
  uuid: ^4.0.0

  # =========================
  # MAPPA REALE (CROSS-PLATFORM)
  # =========================
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # =========================
  # STATE MANAGEMENT
  # =========================
  provider: ^6.1.2

  # =========================
  # UI / MATERIAL
  # =========================
  cupertino_icons: ^1.0.6

  # =========================
  # HTTP
  # =========================
  http: ^1.2.1

  # =========================
  # LOCAL STORAGE
  # =========================
  shared_preferences: ^2.2.2

  # =========================
  # DATE / TIME
  # =========================
  intl: ^0.20.2

  # =========================
  # URL LAUNCHER (APRIRE FONTE)
  # =========================
  url_launcher: ^6.2.6

  # =========================
  # IMAGE PICKER (AVATAR UPLOAD)
  # =========================
  image_picker: ^1.1.2

  # =========================
  # SUPABASE
  # =========================
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true