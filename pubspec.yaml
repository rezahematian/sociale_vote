name: sociale_vote
description: Civic social voting platform
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  fl_chart: ^0.66.0
  uuid: ^4.0.0

  # =========================
  # MAPPA REALE (CROSS-PLATFORM)
  # =========================
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # =========================
  # GEOLOCATION / GEOCODING
  # =========================
  geolocator: ^13.0.4
  geocoding: ^4.0.0

  # =========================
  # STATE MANAGEMENT
  # =========================
  provider: ^6.1.2

  # =========================
  # UI / MATERIAL
  # =========================
  cupertino_icons: ^1.0.6

  # =========================
  # HTTP
  # =========================
  http: ^1.2.1

  # =========================
  # LOCAL STORAGE
  # =========================
  shared_preferences: ^2.2.2

  # =========================
  # DATE / TIME
  # =========================
  intl: ^0.20.2

  # =========================
  # URL LAUNCHER (APRIRE FONTE)
  # =========================
  url_launcher: ^6.3.0

  # =========================
  # IMAGE PICKER (AVATAR UPLOAD)
  # =========================
  image_picker: ^1.1.2

  # =========================
  # SUPABASE
  # =========================
  supabase_flutter: ^2.8.0

  # =========================
  # FIREBASE / ANALYTICS
  # =========================
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true